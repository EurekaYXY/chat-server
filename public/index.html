<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>
    <style>
      .chat {
        display: flex;
        flex-direction: column;
        height: 80vh;
      }
      .messages {
        flex: 1;
        overflow-y: auto;
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .form {
        display: flex;
      }
      .input {
        flex: 1;
        padding: 10px;
        border: 1px solid #ccc;
      }
      .submit {
        padding: 10px;
        border: 1px solid #ccc;
        background: #eee;
        cursor: pointer;
      }
      .messages li {
        padding: 4px 8px;
        cursor: default;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .messages li img.avatar {
        width: 24px;
        height: 24px;
        border-radius: 50%;
      }
      .messages li.mine {
        cursor: pointer;
      }
      .messages li.mine:hover {
        background: #fee;
      }
      .messages li.recalled {
        color: #999;
        font-style: italic;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <div class="chat">
      <ul class="messages"></ul>
      <form class="form">
        <input class="input" autocomplete="off" />
        <button class="submit">Send</button>
      </form>
    </div>
    <canvas
      id="canvas"
      width="600"
      height="600"
      style="border: solid 1px black"
    ></canvas>

    <script>
      function main() {
        const host = location.origin.replace(/^http/, 'ws')
        const ws = new WebSocket(host + '/ws')
        const myId = self.crypto.randomUUID().substr(0, 8)
        let msgCount = 0

        const canvas = document.getElementById('canvas')
        const ctx = canvas.getContext('2d')

        let drawing = false

        canvas.addEventListener('mousedown', (e) => {
          sendDrawingEvent(e.offsetX, e.offsetY, 'mousedown')
        })
        function mousedown() {
          drawing = true
          ctx.beginPath()
        }

        canvas.addEventListener('mousemove', (e) => {
          if (drawing) {
            sendDrawingEvent(e.offsetX, e.offsetY, 'mousemove')
          }
        })
        function mousemove(x, y) {
          if (drawing) {
            draw(x, y, true)
          }
        }

        canvas.addEventListener('mouseup', (e) => {
          sendDrawingEvent(e.offsetX, e.offsetY, 'mouseup')
        })
        function mouseup() {
          drawing = false
          ctx.beginPath()
        }

        canvas.addEventListener('mouseout', (e) => {
          sendDrawingEvent(e.offsetX, e.offsetY, 'mouseout')
        })
        function mouseout() {
          drawing = false
        }

        function draw(x, y, dragging) {
          if (dragging) {
            ctx.lineTo(x, y)
            ctx.stroke()
          } else {
            ctx.moveTo(x, y)
          }
        }

        function sendDrawingEvent(x, y, control) {
          const message = JSON.stringify({ x, y, control, type: 'paint' })
          ws.send(message)
        }

        ws.onmessage = (event) => {
          const msg = JSON.parse(event.data)
          if (msg.type === 'paint') {
            const { x, y, control } = msg
            if (control === 'mousedown') {
              mousedown()
            } else if (control === 'mouseup') {
              mouseup()
            } else if (control === 'mousemove') {
              mousemove(x, y)
            } else if (control === 'mouseout') {
              mouseout()
            }
          }
          if (msg.type === 'chat') {
            const { id, text, msgId } = msg
            const messageList = document.querySelector('.messages')
            const li = document.createElement('li')
            li.id = 'msg-' + msgId
            const avatar = document.createElement('img')
            avatar.src = `https://api.dicebear.com/9.x/icons/svg?seed=${id}`
            avatar.classList.add('avatar')
            li.appendChild(avatar)
            const span = document.createElement('span')
            if (id === myId) {
              span.textContent = `(${id})自分: ` + text
              li.classList.add('mine')
              li.addEventListener('click', () => {
                if (!li.classList.contains('recalled')) {
                  ws.send(JSON.stringify({ type: 'recall', msgId }))
                }
              })
            } else {
              span.textContent = id + ': ' + text
            }
            li.appendChild(span)
            messageList.appendChild(li)
          }
          if (msg.type === 'recall') {
            const target = document.getElementById('msg-' + msg.msgId)
            if (target) {
              target.textContent = 'Message has been recalled'
              target.classList.add('recalled')
              target.classList.remove('mine')
            }
          }
        }

        const form = document.querySelector('.form')

        form.onsubmit = function (e) {
          e.preventDefault()
          const input = document.querySelector('.input')
          const text = input.value
          const msgId = myId + '-' + (msgCount++)
          ws.send(JSON.stringify({ id: myId, text, type: 'chat', msgId }))
          input.value = ''
          input.focus()
        }

        ws.onerror = function (error) {
          console.error('WebSocket Error: ', error)
        }
      }

      main()
    </script>
  </body>
</html>
